- name: Check SSH key secret
  env:
    EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  run: |
    test -n "$EC2_SSH_KEY" || { echo "EC2_SSH_KEY is missing"; exit 1; }
    echo "SSH key secret is present"

- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.2.0
  with:
    host: 13.221.235.98
    username: ec2-user
    key: ${{ secrets.EC2_SSH_KEY }}
    port: 22
    script: |
      set -e
      cd ~/FCPS-Demo
      git fetch origin prod
      git checkout prod
      git reset --hard origin/prod
      docker compose down --remove-orphans
      docker compose build --no-cache
      docker compose up -d
      docker compose ps
